name: CI Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: campus_trade
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: "22"
          distribution: "temurin"
          cache: maven

      - name: Init Database
        run: |
          mysql -h127.0.0.1 -uroot -p123456 campus_trade < init.sql
          mysql -h127.0.0.1 -uroot -p123456 campus_trade < campus-trade-server/src/main/resources/db/migration/V1__upgrade.sql

      - name: Build & Test
        run: |
          cd campus-trade-server
          mvn compile -B
